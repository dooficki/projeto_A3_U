<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Produtos — A3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">Catálogo A3</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item">
            <button type="button" class="btn btn-nav btn-nav-ghost" id="btnVerTodos" aria-current="page">Todos os produtos</button>
          </li>
          <li class="nav-item">
            <button type="button" class="btn btn-nav btn-nav-ghost" id="btnVerFavoritos">
              Favoritos <span class="badge bg-warning text-dark ms-1" id="badgeFavoritos">0</span>
            </button>
          </li>
          <li class="nav-item">
            <button type="button" class="btn btn-nav btn-nav-accent ms-lg-1" id="btnVerAdmin">Administrar produtos</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <header class="mb-4">
      <h1 class="h3 mb-3">Produtos</h1>
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label for="campoBusca" class="form-label mb-0">Buscar por nome</label>
          <input type="search" class="form-control" id="campoBusca" placeholder="Digite parte do título..." autocomplete="off" />
        </div>
        <div class="col-md-4">
          <label for="filtroCategoria" class="form-label mb-0">Categoria</label>
          <select class="form-select" id="filtroCategoria" aria-label="Filtrar por categoria">
            <option value="">Todas as categorias</option>
            <option value="Beleza">Beleza</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Móveis">Móveis</option>
            <option value="Geral">Geral</option>
          </select>
        </div>
        <div class="col-md-3">
          <div id="areaStatus" class="small text-muted" role="status" aria-live="polite"></div>
        </div>
      </div>
    </header>

    <section id="secaoCatalogo" aria-labelledby="tituloCatalogo">
      <h2 id="tituloCatalogo" class="visually-hidden">Listagem do catálogo</h2>
      <div id="gridProdutos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4"></div>
    </section>

    <section id="secaoFavoritos" class="mt-5 d-none" aria-labelledby="tituloFavoritos">
      <h2 id="tituloFavoritos" class="h4 mb-3">Meus favoritos</h2>
      <p id="msgFavoritosVazio" class="text-muted d-none">Nenhum favorito ainda.</p>
      <div id="gridFavoritos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4"></div>
    </section>

    <section id="secaoAdmin" class="mt-2 d-none" aria-labelledby="tituloAdmin">
      <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
        <h2 id="tituloAdmin" class="h4 mb-0">Administrar produtos</h2>
        <button type="button" class="btn btn-primary" id="btnNovo">Novo produto</button>
      </div>
      <p id="adminAlerta" class="alert alert-warning d-none" role="alert"></p>
      <div class="table-responsive bg-white shadow-sm rounded">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Nome</th>
              <th scope="col">Preço</th>
              <th scope="col">Categoria</th>
              <th scope="col" class="text-end">Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabela"></tbody>
        </table>
      </div>
      <p id="msgVazio" class="text-muted mt-3 d-none">Nenhum produto cadastrado.</p>
    </section>
  </main>

  <footer class="border-top py-3 mt-auto bg-white">
    <div class="container small text-muted text-center">A3 Usabilidade</div>
  </footer>

  <div class="modal fade" id="modalProduto" tabindex="-1" aria-labelledby="modalProdutoTitulo" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="modalProdutoTitulo">Produto</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="formProduto">
            <input type="hidden" id="campoId" value="" />
            <div class="mb-3">
              <label class="form-label" for="campoTitulo">Nome</label>
              <input type="text" class="form-control" id="campoTitulo" required maxlength="500" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="campoPreco">Preço (R$)</label>
              <input type="number" class="form-control" id="campoPreco" required min="0" step="0.01" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="campoCategoria">Categoria</label>
              <select class="form-select" id="campoCategoria" required>
                <option value="geral">Geral</option>
                <option value="beauty">Beleza</option>
                <option value="fragrances">Perfumes</option>
                <option value="furniture">Móveis</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label" for="campoThumbnail">URL da imagem</label>
              <input type="text" class="form-control" id="campoThumbnail" maxlength="2000" placeholder="https://..." />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnSalvar">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/storage.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/admin.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
