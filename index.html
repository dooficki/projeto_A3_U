<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Produtos — A3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">Catálogo A3</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item">
            <button type="button" class="btn btn-nav btn-nav-ghost" id="btnVerTodos" aria-current="page">Todos os produtos</button>
          </li>
          <li class="nav-item">
            <button type="button" class="btn btn-nav btn-nav-ghost" id="btnVerFavoritos">
              Favoritos <span class="badge bg-warning text-dark ms-1" id="badgeFavoritos">0</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <header class="mb-4">
      <h1 class="h3 mb-3">Produtos</h1>
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label for="campoBusca" class="form-label mb-0">Buscar por nome</label>
          <input type="search" class="form-control" id="campoBusca" placeholder="Digite parte do título..." autocomplete="off" />
        </div>
        <div class="col-md-4">
          <label for="filtroCategoria" class="form-label mb-0">Categoria</label>
          <select class="form-select" id="filtroCategoria" aria-label="Filtrar por categoria">
            <option value="">Todas as categorias</option>
            <option value="Beleza">Beleza</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Móveis">Móveis</option>
            <option value="Geral">Geral</option>
          </select>
        </div>
        <div class="col-md-3">
          <div id="areaStatus" class="small text-muted" role="status" aria-live="polite"></div>
        </div>
      </div>
    </header>

    <section id="secaoCatalogo" aria-labelledby="tituloCatalogo">
      <h2 id="tituloCatalogo" class="visually-hidden">Listagem do catálogo</h2>
      <div id="gridProdutos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4"></div>
    </section>

    <section id="secaoFavoritos" class="mt-5 d-none" aria-labelledby="tituloFavoritos">
      <h2 id="tituloFavoritos" class="h4 mb-3">Meus favoritos</h2>
      <p id="msgFavoritosVazio" class="text-muted d-none">Nenhum favorito ainda.</p>
      <div id="gridFavoritos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4"></div>
    </section>
  </main>

  <footer class="border-top py-3 mt-auto bg-white">
    <div class="container small text-muted text-center">A3 Usabilidade</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/storage.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
