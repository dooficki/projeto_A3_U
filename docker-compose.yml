services:
  web:
    build: .
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - app-net

  postgres:
    image: postgres:16-alpine
    profiles:
      - db
      - admin
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catalogo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalogo_dev}
      POSTGRES_DB: ${POSTGRES_DB:-catalogo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
    profiles:
      - admin
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-catalogo}:${POSTGRES_PASSWORD:-catalogo_dev}@postgres:5432/${POSTGRES_DB:-catalogo}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
