<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administração de produtos — Catálogo A3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
      <a class="navbar-brand" href="index.html">← Voltar ao catálogo</a>
      <span class="navbar-text small">Gerenciar produtos locais (PostgreSQL)</span>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Produtos cadastrados</h1>
      <button type="button" class="btn btn-primary" id="btnNovo">Novo produto</button>
    </div>
    <p id="adminAlerta" class="alert alert-warning d-none" role="alert"></p>
    <div class="table-responsive bg-white shadow-sm rounded">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Nome</th>
            <th scope="col">Preço</th>
            <th scope="col">Categoria</th>
            <th scope="col" class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
      </table>
    </div>
    <p id="msgVazio" class="text-muted mt-3 d-none">Nenhum produto local. Clique em “Novo produto”.</p>
  </main>

  <div class="modal fade" id="modalProduto" tabindex="-1" aria-labelledby="modalProdutoTitulo" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="modalProdutoTitulo">Produto</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="formProduto">
            <input type="hidden" id="campoId" value="" />
            <div class="mb-3">
              <label class="form-label" for="campoTitulo">Nome</label>
              <input type="text" class="form-control" id="campoTitulo" required maxlength="500" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="campoPreco">Preço (USD)</label>
              <input type="number" class="form-control" id="campoPreco" required min="0" step="0.01" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="campoCategoria">Categoria</label>
              <input type="text" class="form-control" id="campoCategoria" maxlength="200" placeholder="Ex.: eletrônicos" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="campoThumbnail">URL da imagem</label>
              <input type="text" class="form-control" id="campoThumbnail" maxlength="2000" placeholder="https://..." />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnSalvar">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/admin.js"></script>
</body>
</html>
